<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f9f3e2" />
  <title>My Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="masthead">
      <button id="menuBtn" class="menu-btn" aria-label="Start a new page">
        <span></span><span></span><span></span>
      </button>
      <div class="masthead-title">
        <h1>My Journal</h1>
        <div class="masthead-sub"><span id="dateEl">—</span></div>
      </div>
      <div class="masthead-side"></div>
    </header>

    <main id="feed" class="feed">
      <div class="notebook">
        <div class="notebook-margin" aria-hidden="true"></div>
        <div id="feedInner" class="feed-inner">
          <div id="emptyState" class="empty-state">
            <p>The page is blank.</p>
            <p class="empty-hint">Write your question below.</p>
          </div>
        </div>
        <div id="thinking" class="thinking hidden" aria-hidden="true">
          <div class="thinking-row">
            <span class="entry-label">Q</span>
            <span id="thinkingText" class="thinking-text">the journal listens…</span>
          </div>
        </div>
      </div>
    </main>

    <section class="composer">
      <div class="composer-inner">
        <div class="canvas-wrap">
          <canvas id="board"></canvas>
          <div id="canvasHint" class="canvas-hint">write here</div>
        </div>
        <div class="composer-tools">
          <button id="undo" class="tool">Undo</button>
          <button id="clear" class="tool">Clear</button>
          <button id="preview" class="tool">Preview</button>
          <div class="spacer"></div>
          <span id="status" class="status"></span>
          <button id="ask" class="primary">Ask</button>
        </div>
      </div>
    </section>
  </div>

  <template id="entryTemplate">
    <article class="entry">
      <div class="entry-time"></div>
      <div class="entry-row entry-q-row">
        <span class="entry-label">Q</span>
        <div class="entry-text entry-q"></div>
      </div>
      <div class="entry-row entry-a-row">
        <span class="entry-label">A</span>
        <div class="entry-text entry-a"></div>
      </div>
    </article>
  </template>

  <span id="confidence" hidden></span>

  <script type="module" src="app.js"></script>
</body>
</html>
