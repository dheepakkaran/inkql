<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menuBtn" class="icon-btn" aria-label="New page">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="3" y1="5" x2="13" y2="5" />
            <line x1="3" y1="8" x2="13" y2="8" />
            <line x1="3" y1="11" x2="13" y2="11" />
          </svg>
        </button>
      </div>
      <div class="topbar-title">Journal</div>
      <div class="topbar-right">
        <span id="dateEl" class="topbar-date">—</span>
      </div>
    </header>

    <main id="feed" class="feed">
      <div id="feedInner" class="feed-inner">
        <div id="emptyState" class="empty-state">
          <p>No entries yet.</p>
          <p class="empty-hint">Write with your pencil below to begin.</p>
        </div>
      </div>
      <div id="thinking" class="entry thinking hidden" aria-hidden="true">
        <div class="entry-meta"><span id="thinkingLabel">Thinking</span><span class="thinking-dots"></span></div>
      </div>
    </main>

    <section class="composer">
      <div class="composer-inner">
        <div class="canvas-wrap">
          <canvas id="board"></canvas>
          <div id="canvasHint" class="canvas-hint">Write here…</div>
        </div>
        <div class="composer-tools">
          <button id="undo" class="tool">Undo</button>
          <button id="clear" class="tool">Clear</button>
          <button id="preview" class="tool">Preview</button>
          <span class="spacer"></span>
          <span id="status" class="status"></span>
          <button id="ask" class="primary">Ask</button>
        </div>
      </div>
    </section>
  </div>

  <template id="entryTemplate">
    <article class="entry">
      <div class="entry-meta"></div>
      <div class="entry-question"></div>
      <div class="entry-answer"></div>
    </article>
  </template>

  <span id="confidence" hidden></span>

  <script type="module" src="app.js"></script>
</body>
</html>
